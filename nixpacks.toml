[phases.setup]
nixPkgs = ["php80", "php80Extensions.pdo", "php80Extensions.pdo_mysql", "php80Extensions.mbstring", "php80Extensions.xml", "php80Extensions.curl", "php80Extensions.zip", "php80Extensions.gd", "php80Extensions.tokenizer", "php80Extensions.ctype", "php80Extensions.fileinfo", "php80Extensions.openssl", "composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
    "php artisan config:clear",
    "php artisan route:clear",
    "php artisan view:clear",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force && php -S 0.0.0.0:$PORT -t public"
